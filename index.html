<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rock Birthday Finder</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f0f0f;
color:white;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.container{
width:100%;
max-width:900px;
text-align:center;
}

h1{
font-size:3rem;
margin-bottom:10px;
}

.subtitle{
color:#aaa;
margin-bottom:30px;
}

.search-box{
background:#1b1b1b;
padding:25px;
border-radius:20px;
margin-bottom:25px;
}

select,input{
padding:15px;
margin:10px;
border:none;
border-radius:10px;
font-size:1rem;
}

button{
padding:15px 30px;
border:none;
border-radius:10px;
background:#d62828;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
opacity:.9;
}

.card{
display:none;
background:#1b1b1b;
padding:30px;
border-radius:20px;
margin-top:20px;
}

.artist-photo{
font-size:90px;
margin-bottom:15px;
}

.artist-name{
font-size:2.2rem;
margin-bottom:10px;
}

.band{
color:#ff5252;
margin-bottom:15px;
}

.description{
line-height:1.6;
margin-bottom:20px;
}

.range{
color:#aaa;
}

.random-btn{
margin-top:20px;
}
</style>
</head>

<body>

<div class="container">

<h1>🤘 Rock Birthday Finder</h1>
<p class="subtitle">Find your rockstar based on your birthday</p>

<div class="search-box">

<select id="month">
<option>January</option>
<option>February</option>
<option>March</option>
<option>April</option>
<option>May</option>
<option>June</option>
<option>July</option>
<option>August</option>
<option>September</option>
<option>October</option>
<option>November</option>
<option>December</option>
</select>

<input type="number" id="day" placeholder="Day" min="1" max="31">

<br>

<button onclick="findRockstar()">
Find My Rockstar
</button>

</div>

<div id="result" class="card">

<div class="artist-photo" id="photo">🎸</div>

<h2 class="artist-name" id="name"></h2>

<h3 class="band" id="band"></h3>

<p class="description" id="description"></p>

<p class="range" id="range"></p>

<button class="random-btn" onclick="randomRockstar()">
🎸 Meet Another Rockstar
</button>

</div>

</div>

<script>

const artists = [

{month:"January",start:1,end:14,name:"Ozzy Osbourne",band:"Black Sabbath",photo:"🦇",description:"The Prince of Darkness and one of the founding figures of heavy metal."},

{month:"January",start:15,end:31,name:"Lemmy",band:"Motörhead",photo:"♠️",description:"Legendary bassist and frontman known for his unmistakable voice and attitude."},

{month:"February",start:1,end:14,name:"Kerry King",band:"Slayer",photo:"⚡",description:"One of thrash metal's most aggressive and influential guitarists."},

{month:"February",start:15,end:29,name:"Marty Friedman",band:"Megadeth",photo:"🎸",description:"Known for technical solos and a unique melodic style."},

{month:"March",start:1,end:14,name:"Jimi Hendrix",band:"The Jimi Hendrix Experience",photo:"🔥",description:"Widely regarded as one of the greatest guitarists ever."},

{month:"March",start:15,end:31,name:"Lars Ulrich",band:"Metallica",photo:"🥁",description:"Metallica co-founder and drummer."},

{month:"April",start:1,end:14,name:"Dimebag Darrell",band:"Pantera",photo:"💥",description:"A guitar hero whose riffs helped define groove metal."},

{month:"April",start:15,end:30,name:"Phil Collins",band:"Genesis",photo:"🎤",description:"Singer, songwriter and drummer with a legendary career."},

{month:"May",start:1,end:14,name:"Kirk Hammett",band:"Metallica",photo:"🎸",description:"Master of iconic solos and Metallica's lead guitarist."},

{month:"May",start:15,end:31,name:"Axl Rose",band:"Guns N' Roses",photo:"🌹",description:"One of rock's most recognizable frontmen."},

{month:"June",start:1,end:14,name:"2-D",band:"Gorillaz",photo:"🎧",description:"Animated vocalist of Gorillaz."},

{month:"June",start:15,end:30,name:"Murdoc",band:"Gorillaz",photo:"😈",description:"The chaotic bassist of Gorillaz."},

{month:"July",start:1,end:14,name:"Dave Mustaine",band:"Megadeth",photo:"🔥",description:"Founder of Megadeth and thrash metal icon."},

{month:"July",start:15,end:31,name:"Slash",band:"Guns N' Roses",photo:"🎩",description:"Recognizable worldwide for his guitar work and top hat."},

{month:"August",start:1,end:14,name:"Kurt Cobain",band:"Nirvana",photo:"🎤",description:"The face of grunge and Nirvana's frontman."},

{month:"August",start:15,end:31,name:"Dave Grohl",band:"Foo Fighters",photo:"🥁",description:"From Nirvana drummer to Foo Fighters founder."},

{month:"September",start:1,end:14,name:"Fred Durst",band:"Limp Bizkit",photo:"🎧",description:"One of the defining voices of nu metal."},

{month:"September",start:15,end:30,name:"Serj Tankian",band:"System of a Down",photo:"⚡",description:"Known for his unique vocals and creativity."},

{month:"October",start:1,end:14,name:"James Hetfield",band:"Metallica",photo:"🤘",description:"Legendary rhythm guitarist, vocalist and songwriter."},

{month:"October",start:15,end:31,name:"Corey Taylor",band:"Slipknot",photo:"🎭",description:"Powerful vocalist of Slipknot and Stone Sour."},

{month:"November",start:1,end:14,name:"Synyster Gates",band:"Avenged Sevenfold",photo:"🎸",description:"One of modern metal's most talented lead guitarists."},

{month:"November",start:15,end:30,name:"Chad Smith",band:"Red Hot Chili Peppers",photo:"🥁",description:"World-famous drummer with incredible groove."},

{month:"December",start:1,end:14,name:"Flea",band:"Red Hot Chili Peppers",photo:"🎸",description:"Energetic bassist and rock legend."},

{month:"December",start:15,end:31,name:"Rob Zombie",band:"Solo",photo:"☠️",description:"Musician, filmmaker and horror icon."}

];

function showArtist(a){

document.getElementById("result").style.display="block";
document.getElementById("photo").innerText=a.photo;
document.getElementById("name").innerText=a.name;
document.getElementById("band").innerText=a.band;
document.getElementById("description").innerText=a.description;
document.getElementById("range").innerText=
`${a.month} ${a.start}-${a.end}`;
}

function findRockstar(){

const month=document.getElementById("month").value;
const day=parseInt(document.getElementById("day").value);

const artist=artists.find(a =>
a.month===month &&
day>=a.start &&
day<=a.end
);

if(artist){
showArtist(artist);
}else{
alert("Enter a valid day.");
}
}

function randomRockstar(){

const random=
artists[Math.floor(Math.random()*artists.length)];

showArtist(random);
}

</script>

</body>
</html>
